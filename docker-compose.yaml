services:

  postgres-db:
    image: postgres:16-alpine
    container_name: agora-market-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: agora-market-db
    ports:
      - "5432:5432"
    volumes:
      - "postgres-data:/var/lib/postgresql/data"

  agora-market:
    build: .
    image: agora-market-api:0.0-1
    container_name: agora-market-api
    depends_on:
      - postgres-db
    ports:
      - 8080:8080
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/agora-market-db?currentSchema=market
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    deploy:
      resources:
        limits:
          memory: 1024m

volumes:
  postgres-data: